{% load static %}
<header class="header">
    <div class="container navbar">
        <!-- Logo linking to Home Page -->
        <a href="{% url 'core:home' %}" class="logo">
            <img src="{% static 'images/logo.jpg' %}" alt="Green Core Logo" class="logo-img">
            <span>Green</span>Core
        </a>
        
        <!-- Navigation Links -->
        <nav class="nav-links">
            <a href="{% url 'core:home' %}" class="nav-item">Home</a>
            <a href="{% url 'core:about' %}" class="nav-item">About Us</a>
            <a href="{% url 'core:services' %}" class="nav-item">Products & Services</a>
            <a href="{% url 'core:contact' %}" class="nav-item">Contact</a>
            
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard:home' %}" class="nav-item">Dashboard</a>
                <form action="{% url 'logout' %}" method="post" class="nav-form">
                    {% csrf_token %}
                    <button type="submit" class="nav-item nav-btn">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="nav-item">Staff Login</a>
            {% endif %}
            
            <a href="{% url 'core:request_quote' %}" class="btn btn-primary">Request Quote</a>
        </nav>
    </div>
</header>
